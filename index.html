<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 사전</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #f39c12; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 1.5rem; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        button { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        #result { margin-top: 10px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .word-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f9f9f9; padding-bottom: 10px; }
        .word-title { font-size: 28px; font-weight: 800; color: #222; }
        .audio-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--primary); }

        .section-title { font-size: 14px; color: var(--secondary); font-weight: bold; margin-top: 15px; margin-bottom: 5px; display: block; }
        .meaning-kr { font-size: 18px; font-weight: bold; color: #333; background: #fff9e6; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--secondary); }
        .meaning-en { color: #666; font-size: 15px; line-height: 1.4; margin-bottom: 15px; }
        .example-box { background: #f8f9fa; padding: 12px; border-radius: 10px; border-left: 4px solid #ddd; font-style: italic; color: #444; font-size: 14px; }

        .history { width: 100%; max-width: 500px; margin-top: 25px; }
        .history h3 { font-size: 15px; color: #888; margin-bottom: 12px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .history-item:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>🌟 아이들 영어 놀이터</h2>
    <div class="search-box">
        <input type="text" id="wordInput" placeholder="궁금한 단어를 써보세요!" onkeypress="if(event.keyCode==13) searchWord()">
        <button onclick="searchWord()">찾기</button>
    </div>

    <div id="result">
        <div class="word-header">
            <div>
                <span class="word-title" id="resWord"></span>
                <p id="resPhonetic" style="margin: 0; color:#aaa; font-size: 14px;"></p>
            </div>
            <button class="audio-btn" id="audioBtn" onclick="playAudio()">🔊</button>
        </div>

        <span class="section-title">뜻 (Meaning)</span>
        <div id="resMeaningKr" class="meaning-kr">번역 중...</div>
        <div id="resMeaningEn" class="meaning-en"></div>

        <div id="exampleSection">
            <span class="section-title">문장 속 쓰임새 (Example)</span>
            <div id="resExample" class="example-box"></div>
        </div>
    </div>
</div>

<div class="history">
    <h3>최근 찾아본 단어들</h3>
    <div id="historyList" class="history-list"></div>
</div>

<script>
    let currentAudio = null;

    async function searchWord(word) {
        const query = word || document.getElementById('wordInput').value.trim();
        if (!query) return;

        try {
            // 1. 영어 사전 데이터 가져오기
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${query}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            const entry = data[0];
            const firstMeaning = entry.meanings[0];
            const definition = firstMeaning.definitions[0];

            // 2. 화면에 영어 데이터 넣기
            document.getElementById('resWord').innerText = entry.word;
            document.getElementById('resPhonetic').innerText = entry.phonetic || '';
            document.getElementById('resMeaningEn').innerText = definition.definition;
            
            // 예문 처리 (예문이 없는 단어도 있음)
            if (definition.example) {
                document.getElementById('exampleSection').style.display = 'block';
                document.getElementById('resExample').innerText = `"${definition.example}"`;
            } else {
                document.getElementById('exampleSection').style.display = 'none';
            }

            // 3. 한글 번역 (무료 번역 API 대용 라이브러리/방식)
            translateToKr(query);

            // 오디오 설정
            const audioObj = entry.phonetics.find(p => p.audio !== "");
            currentAudio = audioObj ? new Audio(audioObj.audio) : null;
            document.getElementById('audioBtn').style.visibility = currentAudio ? 'visible' : 'hidden';

            document.getElementById('result').style.display = 'block';
            if (!word) saveHistory(entry.word);
        } catch (err) {
            alert("단어를 찾을 수 없어요. 철자를 확인해볼까요?");
        }
        document.getElementById('wordInput').value = '';
    }

    // 간단한 무료 번역 함수 (MyMemory API 사용 - 하루 1000자 무료)
    async function translateToKr(word) {
        const resKr = document.getElementById('resMeaningKr');
        resKr.innerText = "번역 중...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|ko`);
            const data = await res.json();
            resKr.innerText = data.responseData.translatedText;
        } catch {
            resKr.innerText = "뜻을 가져오지 못했어요.";
        }
    }

    function playAudio() { if (currentAudio) currentAudio.play(); }

    function saveHistory(word) {
        let history = JSON.parse(localStorage.getItem('wordHistory') || '[]');
        if (!history.includes(word)) {
            history.unshift(word);
            history = history.slice(0, 10);
            localStorage.setItem('wordHistory', JSON.stringify(history));
            displayHistory();
        }
    }

    function displayHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('wordHistory') || '[]');
        list.innerHTML = history.map(w => `<span
