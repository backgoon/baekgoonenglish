<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 사전 (줌 기능 강화)</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #f39c12; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-main { padding: 0 18px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* 카메라 wrapper: 줌이 적용된 화면을 깔끔하게 보여줌 */
        #camera-wrapper { width: 100%; position: relative; margin-bottom: 15px; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 3/4; display: none; border: 2px solid #ddd; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvas-display { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }

        /* 줌 컨트롤 바 */
        .zoom-control { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; width: 100%; display: none; }
        input[type=range] { flex: 1; cursor: pointer; }

        .controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        .btn-scan { flex: 1; height: 50px; background: #333; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #recommendation-area { display: none; background: #fff9e6; border: 1px solid #ffeaa7; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .word-chip { background: white; color: var(--primary); border: 1.5px solid var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }

        #result { width: 100%; }
        .word-card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .word-title { font-size: 22px; font-weight: 800; color: #222; display: flex; align-items: center; justify-content: space-between; }
        .audio-btn { font-size: 18px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 50%; width: 34px; height: 34px; color: var(--primary); }
        
        .label { font-size: 12px; color: var(--secondary); font-weight: bold; margin-top: 10px; display: block; }
        .meaning-kr { font-size: 18px; font-weight: 700; color: #333; margin: 5px 0; }
        .desc-kr { font-size: 14px; color: #555; line-height: 1.5; background: #f8f9fa; padding: 10px; border-radius: 8px; }

        .history-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .history-item { background: white; padding: 6px 12px; border-radius: 15px; font-size: 13px; border: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 영어 사전</h2>
    
    <div class="search-box">
        <input type="text" id="wordInput" placeholder="단어 직접 입력" onkeypress="if(event.keyCode==13) searchWord()">
        <button class="btn-main" onclick="searchWord()">검색</button>
    </div>

    <div class="controls">
        <button id="toggleBtn" class="btn-scan" onclick="toggleCamera()">📷 카메라 켜기</button>
        <button id="captureBtn" class="btn-scan" style="display:none; background: var(--secondary);" onclick="captureAndProcess()">🔍 화면 멈추고 인식</button>
    </div>

    <div id="zoom-ui" class="zoom-control">
        <span style="font-size: 12px; font-weight: bold;">확대(Zoom)</span>
        <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="2" oninput="applyZoom(this.value)">
        <span id="zoomVal" style="font-size: 12px;">2.0x</span>
    </div>

    <div id="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas-display"></canvas>
    </div>

    <div id="recommendation-area">
        <div id="scan-status" style="font-size: 13px; color: #d35400; font-weight: bold;">분석된 단어 리스트:</div>
        <div id="chipContainer" class="chip-container"></div>
        <button onclick="resetCamera()" style="margin-top:15px; border:none; background:none; color:#888; text-decoration:underline; cursor:pointer; font-size:12px;">다시 찍기</button>
    </div>

    <div id="result"></div>
</div>

<div style="width:100%; max-width:550px; margin-top:20px;">
    <h3 style="font-size:14px; color:#888;">최근 찾은 단어</h3>
    <div id="historyList" class="history-list"></div>
</div>

<script>
    let currentAudio = {};
    let stream = null;
    let track = null;
    const video = document.getElementById('video');
    const canvasDisplay = document.getElementById('canvas-display');
    const ctxDisplay = canvasDisplay.getContext('2d');

    async function toggleCamera() {
        const wrapper = document.getElementById('camera-wrapper');
        const zoomUI = document.getElementById('zoom-ui');
        const toggleBtn = document.getElementById('toggleBtn');
        const captureBtn = document.getElementById('captureBtn');

        if (stream) {
            stopStream();
            wrapper.style.display = 'none';
            zoomUI.style.display = 'none';
            captureBtn.style.display = 'none';
            toggleBtn.innerText = "📷 카메라 켜기";
        } else {
            try {
                // 고해상도 설정
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];
                
                wrapper.style.display = 'block';
                zoomUI.style.display = 'flex';
                captureBtn.style.display = 'block';
                canvasDisplay.style.display = 'none';
                video.style.display = 'block';
                toggleBtn.innerText = "❌ 카메라 끄기";

                // 기본 2배 줌 적용 (지원되는 경우)
                setTimeout(() => applyZoom(2), 500);
            } catch (err) { alert("카메라를 켤 수 없습니다."); }
        }
    }

    function applyZoom(val) {
        document.getElementById('zoomVal').innerText = val + 'x';
        if (track && track.getCapabilities().zoom) {
            track.applyConstraints({ advanced: [{ zoom: val }] });
        } else {
            // 하드웨어 줌 미지원 시 디지털 줌 효과 (CSS)
            video.style.transform = `scale(${val})`;
            video.style.transformOrigin = 'center center';
        }
    }

    function stopStream() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; track = null; }
    }

    async function captureAndProcess() {
        canvasDisplay.width = video.videoWidth;
        canvasDisplay.height = video.videoHeight;
        
        // 흰 배경 최적화 필터
        ctxDisplay.filter = 'contrast(200%) grayscale(100%) brightness(100%)';
        
        // 현재 화면 캡처 (줌 상태 반영)
        ctxDisplay.drawImage(video, 0, 0, canvasDisplay.width, canvasDisplay.height);
        
        video.style.display = 'none';
        canvasDisplay.style.display = 'block';
        
        document.getElementById('scan-status').innerText = "확대된 화면에서 단어를 읽는 중...";
        document.getElementById('recommendation-area').style.display = 'block';
        document.getElementById('chipContainer').innerHTML = "";

        canvasDisplay.toBlob(async (blob) => {
            await processOCR(blob);
        }, 'image/jpeg', 1.0);
    }

    async function processOCR(blob) {
        try {
            const worker = Tesseract.createWorker();
            await worker.load();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ ' });
            
            const { data: { text } } = await worker.recognize(blob);
            await worker.terminate();

            const rawWords = text.replace(/[^a-zA-Z\s]/g, ' ').split(/\s+/);
            const validWords = rawWords.filter(w => w.length >= 4); // 4글자 이상 유효 단어
            
            if (validWords.length > 0) {
                const uniqueWords = [...new Set(validWords.map(w => w.toLowerCase()))].slice(0, 15);
                displayChips(uniqueWords);
                document.getElementById('scan-status').innerText = "공부할 단어를 선택하세요:";
            } else {
                document.getElementById('scan-status').innerText = "인식 실패. 글자를 더 크게 비춰주세요.";
            }
        } catch (e) { document.getElementById('scan-status').innerText = "오류 발생"; }
    }

    function displayChips(words) {
        const container = document.getElementById('chipContainer');
        container.innerHTML = words.map(w => `<span class="word-chip" onclick="searchWord('${w}')">${w}</span>`).join('');
    }

    function resetCamera() {
        video.style.display = 'block';
        canvasDisplay.style.display = 'none';
        document.getElementById('recommendation-area').style.display = 'none';
    }

    async function searchWord(word) {
        const query = (word || document.getElementById('wordInput').value).trim().toLowerCase();
        if (!query) return;

        const resultArea = document.getElementById('result');
        if (document.getElementById(`card_${query}`)) {
            resultArea.prepend(document.getElementById(`card_${query}`));
            return;
        }

        const card = document.createElement('div');
        card.id = `card_${query}`;
        card.className = 'word-card';
        card.innerHTML = `
            <div class="word-title">${query} <button class="audio-btn" onclick="playAudio('${query}')">🔊</button></div>
            <span class="label">뜻</span>
            <div id="kr_${query}" class="meaning-kr">해석 중...</div>
            <span class="label">상세 한글 설명</span>
            <div id="desc_${query}" class="desc-kr">가져오는 중...</div>
        `;
        resultArea.prepend(card);

        try {
            // 한글 번역
            const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${query}&langpair=en|ko`);
            const transData = await transRes.json();
            document.getElementById(`kr_${query}`).innerText = transData.responseData.translatedText;

            // 상세 설명 번역
            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${query}`);
            if (dictRes.ok) {
                const data = await dictRes.json();
                const defEn = data[0].meanings[0].definitions[0].definition;
                const descRes = await fetch(`https://api.mymemory.translated.net/get?q=${defEn}&langpair=en|ko`);
                const descData = await descRes.json();
                document.getElementById(`desc_${query}`).innerText = descData.responseData.translatedText;
                
                const audio = data[0].phonetics.find(p => p.audio !== "");
                if (audio) currentAudio[query] = new Audio(audio.audio);
            } else {
                document.getElementById(`desc_${query}`).innerText = "정보를 찾을 수 없습니다.";
            }
            saveHistory(query);
        } catch (e) { document.getElementById(`kr_${query}`).innerText = "오류"; }
        document.getElementById('wordInput').value = '';
    }

    function playAudio(w) { if (currentAudio[w]) currentAudio[w].play(); }
    function saveHistory(w) {
        let h = JSON.parse(localStorage.getItem('wordHistory') || '[]');
        if (!h.includes(w)) { h.unshift(w); h = h.slice(0, 15); localStorage.setItem('wordHistory', JSON.stringify(h)); displayHistory(); }
    }
    function displayHistory() {
        const list = document.getElementById('historyList');
        const h = JSON.parse(localStorage.getItem('wordHistory') || '[]');
        list.innerHTML = h.map(w => `<span class="history-item" onclick="searchWord('${w}')">${w}</span>`).join('');
    }
    displayHistory();
</script>
</body>
</html>
